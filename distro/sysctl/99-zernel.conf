# Zernel ML-Optimized Kernel Parameters
# Copyright (C) 2026 Dyber, Inc.
# Applied at boot via /etc/sysctl.d/99-zernel.conf

# === Virtual Memory ===
vm.swappiness=0                    # Never swap — ML servers should never swap
vm.dirty_ratio=40                  # Allow more dirty pages (large dataset writes)
vm.dirty_background_ratio=10
vm.overcommit_memory=1             # Allow memory overcommit (PyTorch needs this)
vm.nr_hugepages=1024               # Pre-allocate 1GB huge pages for GPU DMA

# === Network (Distributed Training) ===
net.core.rmem_max=134217728        # 128MB receive buffer
net.core.wmem_max=134217728        # 128MB send buffer
net.ipv4.tcp_rmem=4096 87380 134217728
net.ipv4.tcp_wmem=4096 65536 134217728
net.core.netdev_max_backlog=250000
net.ipv4.tcp_congestion_control=bbr  # Better for datacenter workloads

# === NUMA ===
kernel.numa_balancing=1

# === File Handles ===
fs.file-max=2097152
fs.inotify.max_user_watches=524288
