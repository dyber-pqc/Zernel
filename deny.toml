# Zernel dependency policy
# Copyright (C) 2026 Dyber, Inc.
# https://embarkstudios.github.io/cargo-deny/

[advisories]
vulnerability = "deny"
unmaintained = "warn"
yanked = "warn"
notice = "warn"

[licenses]
unlicensed = "deny"
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "GPL-2.0",
    "OpenSSL",
    "Ring",
]
copyleft = "warn"

[[licenses.exceptions]]
allow = ["MPL-2.0"]
name = "option-ext"

[[licenses.exceptions]]
allow = ["MPL-2.0"]
name = "webpki-roots"

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
