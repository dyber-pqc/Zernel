# Zernel dependency policy
# Copyright (C) 2026 Dyber, Inc.
# https://embarkstudios.github.io/cargo-deny/

[graph]
targets = []
all-features = false
no-default-features = false

[advisories]
vulnerability = "warn"
yanked = "warn"
notice = "warn"
ignore = []

[licenses]
unlicensed = "warn"
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "GPL-2.0-only",
    "GPL-2.0-or-later",
    "OpenSSL",
    "BSL-1.0",
    "CC0-1.0",
    "MPL-2.0",
]
copyleft = "warn"
confidence-threshold = 0.8

# ring uses a custom license (ISC-style)
[[licenses.exceptions]]
allow = ["ISC", "MIT", "OpenSSL"]
name = "ring"
version = "*"

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
