name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: zernel-linux-x86_64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: zernel-linux-aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binaries
        run: cargo build --workspace --release --target ${{ matrix.target }}

      - name: Package binaries
        run: |
          mkdir -p dist/${{ matrix.artifact }}/{bin,config,docs,systemd,scripts}

          # Binaries
          cp target/${{ matrix.target }}/release/zernel dist/${{ matrix.artifact }}/bin/
          cp target/${{ matrix.target }}/release/zernel-scheduler dist/${{ matrix.artifact }}/bin/
          cp target/${{ matrix.target }}/release/zernel-ebpf dist/${{ matrix.artifact }}/bin/zerneld
          cp target/${{ matrix.target }}/release/zernel-dashboard dist/${{ matrix.artifact }}/bin/

          # Configuration
          cp distro/sysctl/99-zernel.conf dist/${{ matrix.artifact }}/config/
          cp distro/kernel/config/zernel-x86_64 dist/${{ matrix.artifact }}/config/

          # systemd services
          cp distro/systemd/*.service dist/${{ matrix.artifact }}/systemd/

          # Scripts
          cp distro/scripts/setup-ml-stack.sh dist/${{ matrix.artifact }}/scripts/
          cp distro/scripts/zernel-install dist/${{ matrix.artifact }}/scripts/
          cp scripts/quickstart-wsl.sh dist/${{ matrix.artifact }}/scripts/

          # Documentation
          cp -r docs dist/${{ matrix.artifact }}/docs/
          cp README.md LICENSE LICENSE-ENTERPRISE SECURITY.md dist/${{ matrix.artifact }}/

          # Install script
          cat > dist/${{ matrix.artifact }}/install.sh << 'INSTALLER'
          #!/usr/bin/env bash
          set -euo pipefail
          echo "Installing Zernel..."
          sudo cp bin/zernel /usr/local/bin/
          sudo cp bin/zernel-scheduler /usr/local/bin/
          sudo cp bin/zerneld /usr/local/bin/
          sudo cp bin/zernel-dashboard /usr/local/bin/
          sudo cp scripts/zernel-install /usr/local/bin/
          sudo mkdir -p /etc/zernel
          sudo cp config/99-zernel.conf /etc/sysctl.d/ 2>/dev/null || true
          sudo cp systemd/*.service /etc/systemd/system/ 2>/dev/null || true
          sudo systemctl daemon-reload 2>/dev/null || true
          echo "Zernel installed. Run: zernel doctor"
          INSTALLER
          chmod +x dist/${{ matrix.artifact }}/install.sh

          # Create tarball and zip
          tar -czf ${{ matrix.artifact }}.tar.gz -C dist ${{ matrix.artifact }}
          cd dist && zip -r ../${{ matrix.artifact }}.zip ${{ matrix.artifact }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.zip

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create source archives
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          git archive --format=tar.gz --prefix=zernel-${VERSION}/ HEAD > zernel-${VERSION}-source.tar.gz
          git archive --format=zip --prefix=zernel-${VERSION}/ HEAD > zernel-${VERSION}-source.zip

      - name: Generate checksums
        run: |
          sha256sum *.tar.gz *.zip > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Zernel ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          generate_release_notes: true
          files: |
            *.tar.gz
            *.zip
            SHA256SUMS.txt
          body: |
            ## Zernel ${{ github.ref_name }} — AI-Native Linux OS

            ### What's in This Release

            Zernel is a Linux distribution built for ML and LLM workloads. This release includes:

            - **zernel** — CLI IDE with experiment tracking, model registry, job orchestration, ZQL queries
            - **zernel-scheduler** — sched_ext ML-aware CPU scheduler with phase detection, NUMA, multi-tenant
            - **zerneld** — eBPF observability daemon (Prometheus + WebSocket telemetry)
            - **zernel-dashboard** — Browser-based monitoring UI (axum + htmx + SSE)
            - **zernel-install** — ML tool package manager (25+ tools)
            - **setup-ml-stack.sh** — Full ML/AI/LLM stack installer (PyTorch, JAX, vLLM, Ollama, etc.)
            - **systemd services** — zerneld, zernel-scheduler, zernel-dashboard, ollama
            - **Kernel config** — ML-optimized Linux 6.12+ .config with huge pages, NUMA, RDMA, sched_ext
            - **sysctl tuning** — Pre-tuned for ML workloads (no swap, 128MB network buffers, BBR)

            ### Downloads

            | File | Description |
            |------|-------------|
            | `zernel-linux-x86_64.tar.gz` | Linux x86_64 — all binaries, configs, docs, install script |
            | `zernel-linux-x86_64.zip` | Same as above (zip format) |
            | `zernel-linux-aarch64.tar.gz` | Linux ARM64 — all binaries, configs, docs, install script |
            | `zernel-linux-aarch64.zip` | Same as above (zip format) |
            | `zernel-*-source.tar.gz` | Complete source code |
            | `zernel-*-source.zip` | Complete source code (zip format) |
            | `SHA256SUMS.txt` | SHA-256 checksums for verification |

            ### Quick Install (Linux)

            ```bash
            # Download and extract
            curl -fsSL https://github.com/dyber-pqc/Zernel/releases/download/${{ github.ref_name }}/zernel-linux-x86_64.tar.gz | tar xz
            cd zernel-linux-x86_64

            # Install all binaries + services
            sudo bash install.sh

            # Verify
            zernel --version
            zernel doctor

            # Install ML stack (PyTorch, JAX, vLLM, Ollama, Jupyter, etc.)
            sudo bash scripts/setup-ml-stack.sh

            # Start monitoring
            sudo systemctl start zerneld
            zernel watch
            ```

            ### Build from Source

            ```bash
            # From source archive
            tar xzf zernel-*-source.tar.gz && cd zernel-*/
            cargo build --workspace --release
            cargo test --workspace  # 109 tests
            ```

            ### What's Included in the Archive

            ```
            zernel-linux-x86_64/
            ├── bin/
            │   ├── zernel              # CLI IDE
            │   ├── zernel-scheduler    # sched_ext CPU scheduler
            │   ├── zerneld             # eBPF observability daemon
            │   └── zernel-dashboard    # Web dashboard
            ├── config/
            │   ├── 99-zernel.conf      # ML-optimized sysctl params
            │   └── zernel-x86_64       # Kernel .config
            ├── systemd/
            │   ├── zerneld.service
            │   ├── zernel-scheduler.service
            │   ├── zernel-dashboard.service
            │   └── ollama.service
            ├── scripts/
            │   ├── setup-ml-stack.sh   # Full ML/AI/LLM installer
            │   ├── zernel-install      # Tool package manager
            │   └── quickstart-wsl.sh   # WSL quick start
            ├── docs/                   # 9 documentation files
            ├── install.sh              # One-command installer
            ├── README.md
            ├── LICENSE                 # GPL-2.0 (kernel components)
            ├── LICENSE-ENTERPRISE      # Proprietary (CLI, dashboard)
            └── SECURITY.md
            ```

            ---
            **Zernel** — The OS that ML infrastructure engineers wish existed.
            Copyright (C) 2026 [Dyber, Inc.](https://dyber.org)
