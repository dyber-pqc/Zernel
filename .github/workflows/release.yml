name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: zernel-linux-x86_64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: zernel-linux-aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binaries
        run: cargo build --workspace --release --target ${{ matrix.target }}

      - name: Package binaries (tarball)
        run: |
          mkdir -p dist/${{ matrix.artifact }}
          cp target/${{ matrix.target }}/release/zernel dist/${{ matrix.artifact }}/
          cp target/${{ matrix.target }}/release/zernel-scheduler dist/${{ matrix.artifact }}/
          cp target/${{ matrix.target }}/release/zernel-ebpf dist/${{ matrix.artifact }}/zerneld
          cp README.md LICENSE LICENSE-ENTERPRISE dist/${{ matrix.artifact }}/
          cp -r docs dist/${{ matrix.artifact }}/
          cp -r distro dist/${{ matrix.artifact }}/
          tar -czf ${{ matrix.artifact }}.tar.gz -C dist ${{ matrix.artifact }}

      - name: Package binaries (zip)
        run: |
          cd dist && zip -r ../${{ matrix.artifact }}.zip ${{ matrix.artifact }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.zip

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create source archives
        run: |
          git archive --format=tar.gz --prefix=zernel-${GITHUB_REF_NAME#v}/ HEAD > zernel-${GITHUB_REF_NAME#v}-source.tar.gz
          git archive --format=zip --prefix=zernel-${GITHUB_REF_NAME#v}/ HEAD > zernel-${GITHUB_REF_NAME#v}-source.zip

      - name: Generate checksums
        run: |
          sha256sum *.tar.gz *.zip > SHA256SUMS.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Zernel ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          generate_release_notes: true
          files: |
            *.tar.gz
            *.zip
            SHA256SUMS.txt
          body: |
            ## Zernel ${{ github.ref_name }}

            ### Downloads

            | File | Description |
            |------|-------------|
            | `zernel-linux-x86_64.tar.gz` | Linux x86_64 binaries (zernel, zernel-scheduler, zerneld) |
            | `zernel-linux-x86_64.zip` | Linux x86_64 binaries (zip) |
            | `zernel-linux-aarch64.tar.gz` | Linux aarch64/ARM64 binaries |
            | `zernel-linux-aarch64.zip` | Linux aarch64/ARM64 binaries (zip) |
            | `zernel-*-source.tar.gz` | Source code (tarball) |
            | `zernel-*-source.zip` | Source code (zip) |
            | `SHA256SUMS.txt` | SHA-256 checksums for all files |

            ### Quick Install

            ```bash
            # Download and extract
            curl -fsSL https://github.com/dyber-pqc/Zernel/releases/download/${{ github.ref_name }}/zernel-linux-x86_64.tar.gz | tar xz
            cd zernel-linux-x86_64

            # Install binaries
            sudo cp zernel /usr/local/bin/
            sudo cp zernel-scheduler /usr/local/bin/
            sudo cp zerneld /usr/local/bin/

            # Verify
            zernel --version
            zernel doctor
            ```

            ### Build from Source

            ```bash
            tar xzf zernel-*-source.tar.gz
            cd zernel-*/
            cargo build --workspace --release
            cargo test --workspace
            ```

